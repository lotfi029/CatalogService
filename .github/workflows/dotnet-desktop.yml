name: CI/CD — CatalogService

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  DOTNET_VERSION: "10.x"
  SOLUTION_FILE: "Ecommerce.CatalogService.sln"
  IMAGE_NAME: docker.io/lotfi029/catalog-service
  DOCKERFILE_PATH: CatalogService.API/Dockerfile
  DOCKERHUB_USERNAME: lotfi029

# ──────────────────────────────────────────────────────────────
# Default token permissions — locked down to least privilege.
# Individual jobs override only what they actually need.
# ──────────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1 — Restore, build, and test
  # Runs on every push and every pull request.
  # Uploads the .trx artifact so Job 3 can publish results.
  # ────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Keyed on all .csproj and .props files so the cache is
      # invalidated only when dependencies actually change.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build (Release)
        run: >
          dotnet build ${{ env.SOLUTION_FILE }}
          --configuration Release
          --no-restore

      - name: Run tests
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration Release
          --no-build
          --no-restore
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"

      # Upload .trx files as an artifact so the report job can
      # consume them. The build job itself does NOT need checks:write.
      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2 — Publish test report
  #
  # Separated from the build job so it can be granted
  # checks: write without giving that permission to the entire
  # build environment.
  #
  # dorny/test-reporter creates a GitHub Check Run, which
  # requires checks: write. On pull_requests from forks the
  # token is restricted — the reporter job uses
  # pull-requests: write as well so annotations appear on the PR.
  # ────────────────────────────────────────────────────────────
  report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: build
    # Always run so results are visible even when tests fail.
    if: always()

    permissions:
      contents: read
      checks: write        # Needed to create a Check Run
      pull-requests: write # Needed to annotate PRs

    steps:
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Publish test report
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: "**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false

  # ────────────────────────────────────────────────────────────
  # Job 3 — Build and push Docker image
  #
  # Runs ONLY on a push to master (never on PRs).
  # Depends on both build AND report passing.
  # ────────────────────────────────────────────────────────────
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, report]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Generates two tags automatically:
      #   latest   — always points to the newest master build
      #   sha-XXXX — short SHA for traceability back to the commit
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Enables BuildKit and layer-cache support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stores and restores BuildKit layer cache in
          # GitHub's cache store — cuts rebuild time significantly.
          cache-from: type=gha
          cache-to: type=gha,mode=max
