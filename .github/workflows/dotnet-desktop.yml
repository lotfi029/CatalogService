name: CI/CD — CatalogService

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  DOTNET_VERSION: "10.x"
  SOLUTION_FILE: "Ecommerce.CatalogService.sln"
  IMAGE_NAME: docker.io/lotfi029/catalog-service
  DOCKERFILE_PATH: CatalogService.API/Dockerfile
  DOCKERHUB_USERNAME: lotfi029

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1 — Restore, build, and test
  # ────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build (Release)
        run: >
          dotnet build ${{ env.SOLUTION_FILE }}
          --configuration Release
          --no-restore

      - name: Run tests
        # continue-on-error keeps the upload step alive even
        # when tests fail — the report job surfaces the failures.
        continue-on-error: true
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration Release
          --no-build
          --no-restore
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2 — Publish test report
  #
  # Separated so it can hold checks: write without elevating
  # the build job. Checks out the repo so dorny/test-reporter
  # can run `git ls-files` to resolve source file paths —
  # this is what caused the "not a git repository" exit 128.
  # ────────────────────────────────────────────────────────────
  report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: build
    if: always()

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      # dorny/test-reporter internally runs `git ls-files` to map
      # .trx file paths back to repository source files.
      # A checkout must come before the reporter — even though
      # we are only publishing results, not building anything.
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results
          # Place into a dedicated folder so the glob is unambiguous.
          path: test-results

      - name: Publish test report
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: "test-results/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false

  # ────────────────────────────────────────────────────────────
  # Job 3 — Build and push Docker image
  # Runs ONLY on a push to master, after both jobs above pass.
  # ────────────────────────────────────────────────────────────
  docker-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, report]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
